<!DOCTYPE html>
<html>
<head><title>DSP Image Saver</title></head>
<body style="font-family:sans-serif;padding:2rem;background:#1B4332;color:#FAF8F5;">
<h1>Dakota Sky Image Saver</h1>
<p>Upload images here. They'll be available for download with the correct filenames.</p>
<div id="uploads" style="display:flex;flex-wrap:wrap;gap:1rem;margin-top:1rem;"></div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:block;margin:1rem 0;padding:1rem;background:#D4A843;border:none;border-radius:8px;cursor:pointer;font-size:1rem;">
<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
  const container = document.getElementById('uploads');
  for (const file of e.target.files) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const div = document.createElement('div');
      div.style.cssText = 'background:#2D2D2D;padding:1rem;border-radius:8px;text-align:center;';
      div.innerHTML = '<img src="' + ev.target.result + '" style="max-width:300px;max-height:200px;border-radius:4px;"><br><strong>' + file.name + '</strong><br><small>' + Math.round(file.size/1024) + ' KB</small>';
      container.appendChild(div);
    };
    reader.readAsDataURL(file);
  }
});
</script>
</body>
</html>
