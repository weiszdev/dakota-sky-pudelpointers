<!DOCTYPE html>
<html>
<head><title>DSP Image Saver</title></head>
<body style="font-family:sans-serif;padding:2rem;background:#1B4332;color:#FAF8F5;">
<header style="background-color:#1a3c34;padding:1rem 0;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
    <div style="max-width:1280px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;">
      <a href="index.html"><img src="logo-clear.png" alt="Dakota Sky Pudelpointers" style="height:55px;width:auto;"></a>
      <nav style="display:flex;gap:2rem;">
        <a href="index.html" style="color:white;text-decoration:none;font-size:0.95rem;">Home</a>
        <a href="breeding.html" style="color:white;text-decoration:none;font-size:0.95rem;">Breeding</a>
        <a href="training.html" style="color:white;text-decoration:none;font-size:0.95rem;">Training</a>
        <a href="boarding.html" style="color:white;text-decoration:none;font-size:0.95rem;">Boarding</a>
        <a href="contact.html" style="color:white;text-decoration:none;font-size:0.95rem;">Contact</a>
      </nav>
    </div>
  </header>
<h1>Dakota Sky Image Saver</h1>
<p>Upload images here. They'll be available for download with the correct filenames.</p>
<div id="uploads" style="display:flex;flex-wrap:wrap;gap:1rem;margin-top:1rem;"></div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:block;margin:1rem 0;padding:1rem;background:#D4A843;border:none;border-radius:8px;cursor:pointer;font-size:1rem;">
<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
  const container = document.getElementById('uploads');
  for (const file of e.target.files) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const div = document.createElement('div');
      div.style.cssText = 'background:#2D2D2D;padding:1rem;border-radius:8px;text-align:center;';
      div.innerHTML = '<img src="' + ev.target.result + '" style="max-width:300px;max-height:200px;border-radius:4px;"><br><strong>' + file.name + '</strong><br><small>' + Math.round(file.size/1024) + ' KB</small>';
      container.appendChild(div);
    };
    reader.readAsDataURL(file);
  }
});
</script>
<footer style="background-color:#1a3c34;color:white;padding:2rem;text-align:center;margin-top:3rem;">
    <a href="index.html"><img src="logo-clear.png" alt="Dakota Sky Pudelpointers" style="height:40px;width:auto;margin-bottom:1rem;"></a>
    <p style="color:rgba(255,255,255,0.7);font-size:0.9rem;">&copy; 2026 Dakota Sky Pudelpointers. All rights reserved. | Dickinson, North Dakota</p>
  </footer>
</body>
</html>
